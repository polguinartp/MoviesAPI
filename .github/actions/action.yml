name: "custom action for generating a docker image"
description: "this is a custom action that generates and pushes a Docker image to a repository called Api-Application with tag 'latest'"
inputs:
  username:
    description: "username for the user of the Docker repository"
    required: true
  token:
    description: "token for storing the image in a Docker repository"
    required: true
outputs:
  text:
    description: "congrats for the image build!"
runs:
  using: 'composite'
  steps:        
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ inputs.username }}
        password: ${{ inputs.token }}
          
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: ./
        file: Dockerfile
        push: true
        tags: ${{ inputs.username }}/api-application:latest
